<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숫자 야구 게임</title>
    <style>
        /* 기본 레이아웃 및 폰트 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* 앱 화면(LinearLayout) 모방 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border: 2px solid #ccc;
        }

        /* 색상 변수 (안드로이드 @color/Carrot 적용) */
        :root {
            --carrot: #FFED983A;
            --gray: #808080;
        }

        /* 상단 배너 (광고 영역 대체) */
        .ad-banner {
            background-color: var(--carrot);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* 정보 영역 (기회 횟수, 상태 메세지) */
        .info-layout {
            display: flex;
            background-color: var(--carrot);
            padding: 10px;
        }
        .info-text {
            flex: 1;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        /* 결과 기록 텍스트 영역 */
        #result_text {
            height: 230px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            overflow-y: auto; /* 스크롤 가능하게 */
            white-space: pre-wrap;
            border: 1px dashed #ccc;
            padding: 5px;
        }

        /* 숫자 입력칸 */
        #reque {
            height: 40px;
            margin: 0 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 2px solid var(--carrot);
            border-radius: 5px;
        }
        #reque:disabled {
            background-color: #eee;
            border-color: var(--gray);
        }

        /* 버튼 그룹 */
        .button-layout {
            display: flex;
            margin: 10px 5px;
        }
        .btn {
            flex: 1;
            margin: 0 5px;
            padding: 10px 0;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-carrot { background-color: var(--carrot); }
        .btn-gray { background-color: var(--gray); }
        .btn:disabled { background-color: var(--gray); cursor: not-allowed; }

        /* 이미지 영역 */
        .image-layout {
            height: 250px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
        }
        #imageView {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 게임방법 버튼 */
        .how-btn {
            background-color: black;
            color: white;
            font-size: 18px;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="ad-banner">AD Unit (Google Admob)</div>

    <div class="info-layout">
        <div class="info-text" id="life_count_text">기회:10번</div>
        <div class="info-text" id="res_text"></div>
    </div>

    <div id="result_text"></div>

    <input type="number" id="reque" placeholder="숫자를 입력해주세요" maxlength="3" oninput="maxLengthCheck(this)">

    <div class="button-layout">
        <button id="startB" class="btn btn-carrot">게임시작</button>
        <button id="answerB" class="btn btn-carrot">투구!!</button>
        <button id="resetB" class="btn btn-carrot">처음부터</button>
    </div>

    <div class="image-layout">
        <img id="imageView" src="https://superboyda.github.io/superboyda/baseb.png" alt="baseball">
    </div>

    <button id="HowG" class="how-btn">게임방법</button>
</div>

<script>
    // HTML 요소 변수 할당
    const reque = document.getElementById('reque');
    const resText = document.getElementById('res_text');
    const resultText = document.getElementById('result_text');
    const lifeCountText = document.getElementById('life_count_text');
    
    const startBtn = document.getElementById('startB');
    const answerBtn = document.getElementById('answerB');
    const resetBtn = document.getElementById('resetB');
    const howBtn = document.getElementById('HowG');
    const imageView = document.getElementById('imageView');

    // 게임 변수
    let comNumbers = [];
    let lifeCount = 10;
    
    // 페이지 로드 시 초기화 상태(end 모드) 실행
    window.onload = function() {
        viewMode("end");
    };

    // 버튼 이벤트 리스너 등록
    startBtn.addEventListener('click', function() {
        randomNumber();
        toastMessage("게임시작");
        viewMode("start");
    });

    howBtn.addEventListener('click', function() {
        // 기존 안드로이드의 R.drawable.howgame 과 매칭
        imageView.src = "https://superboyda.github.io/superboyda/howgame.png"; 
    });

    answerBtn.addEventListener('click', function() {
        numberCheck();
        reque.value = ""; // 투구 후 입력창 비우기
        reque.focus();
    });

    resetBtn.addEventListener('click', function() {
        toastMessage("초기화");
        viewMode("end");
        reset();
    });

    // 안드로이드 Toast 메세지를 브라우저 alert으로 대체
    function toastMessage(msg) {
        // alert(msg); 대신 부드럽게 화면에 텍스트로 띄울수도 있지만 안드로이드 기능 모방을 위해 가벼운 모달을 사용할 수 있습니다.
        // 현재는 콘솔이나 화면 표시로 대체하거나 alert을 사용합니다.
        console.log(msg); // 잦은 alert 방지를 위해 콘솔에 로그
    }

    // 화면 상태(버튼 활성/비활성 및 색상) 변경
    function viewMode(mode) {
        if (mode === "start") {
            startBtn.disabled = true;
            answerBtn.disabled = false;
            resetBtn.disabled = false;
            reque.disabled = false;
        } else if (mode === "end") {
            startBtn.disabled = false;
            answerBtn.disabled = true;
            resetBtn.disabled = true;
            reque.disabled = true;
            imageView.src = "https://superboyda.github.io/superboyda/baseb.png"; // 초기 화면 이미지 복구
        }
    }

    // 1~9 사이의 중복 없는 숫자 3개 생성 (Kotlin 로직 그대로 구현)
    function randomNumber() {
        let set = new Set();
        while (set.size < 3) {
            // Kotlin의 Random.nextInt(8) + 1 로직 반영 (1~9)
            let randomValue = Math.floor(Math.random() * 9) + 1;
            set.add(randomValue);
        }
        comNumbers = Array.from(set);
        
        // Kotlin 코드에 있던 list.shuffle()은 Array.from(set) 과정에서 이미 무작위이므로 생략 가능하나
        // 완벽한 셔플을 원한다면 아래 코드를 적용합니다.
        comNumbers.sort(() => Math.random() - 0.5);
    }

    // 변수 초기화
    function reset() {
        lifeCount = 10;
        lifeCountText.innerText = `기회:${lifeCount}번`;
        resText.innerText = "";
        resultText.innerText = "";
        reque.value = "";
    }

    // 정답 체크 로직
    function numberCheck() {
        let inputNumber = reque.value;

        if (inputNumber.length === 3) {
            lifeCount--;
            lifeCountText.innerText = `기회:${lifeCount}번`;

            let userNumbers = [
                parseInt(inputNumber.substring(0, 1)),
                parseInt(inputNumber.substring(1, 2)),
                parseInt(inputNumber.substring(2, 3))
            ];

            let strike = 0;
            let ball = 0;

            // 랜덤값과 입력값 비교
            for (let num = 0; num < 3; num++) {
                for (let num2 = 0; num2 < 3; num2++) {
                    if (comNumbers[num] === userNumbers[num2]) {
                        if (num === num2) {
                            strike++;
                        } else {
                            ball++;
                        }
                    }
                }
            }

            if (strike === 3) {
                toastMessage("성공");
                resText.innerText = `정답: ${comNumbers[0]}, ${comNumbers[1]}, ${comNumbers[2]}`;
                showResult(inputNumber, strike, ball);
                viewMode("end"); // 게임 끝
            } else if (lifeCount === 0) {
                toastMessage("실패");
                resText.innerText = `정답: ${comNumbers[0]}, ${comNumbers[1]}, ${comNumbers[2]}`;
                showResult(inputNumber, strike, ball);
                viewMode("end"); // 게임 끝
            } else {
                resText.innerText = `Strike: ${strike}, Ball: ${ball}`;
                showResult(inputNumber, strike, ball);
            }

        } else {
            alert("숫자 3개를 입력해 주세요");
        }
    }

    // 결과 텍스트 누적 기록
    function showResult(inputNumber, strike, ball) {
        let result = `Strike: ${strike}, Ball: ${ball}`;
        resultText.innerText += `${inputNumber} : ${result}\n`;
        // 스크롤 맨 아래로 이동
        resultText.scrollTop = resultText.scrollHeight;
    }

    // input type="number"의 글자수 제한 보조 함수
    function maxLengthCheck(object){
        if (object.value.length > object.maxLength){
            object.value = object.value.slice(0, object.maxLength);
        }
    }
</script>
</body>
</html>
