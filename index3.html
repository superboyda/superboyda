<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숫자 야구 게임</title>
    <style>
        /* 1. 모바일 키보드가 올라와도 화면이 밖으로 나가지 않도록 100% 고정 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            background-color: #f0f0f0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden; /* 브라우저 자체 스크롤 차단 */
        }

        /* 2. 메인 컨테이너 (유연한 Flexbox 레이아웃) */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100%; /* 화면 높이에 딱 맞춤 */
            margin: 0 auto;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 2px solid #ccc;
            border-right: 2px solid #ccc;
        }

        /* 3. 4컷 만화 영역 (위쪽 고정) */
        .comic-layout {
            padding: 10px;
            background-color: #f9f9f9;
            border-bottom: 2px solid #ccc;
            flex-shrink: 0; /* 키보드가 올라와도 찌그러지지 않음 */
        }
        .comic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .comic-grid img {
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border: 2px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #ddd; /* 이미지 로딩 전 기본 색상 */

            /* 애니메이션 기본 세팅 */
            opacity: 0; 
            transform: translateY(15px); 
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        /* 자바스크립트가 show 클래스를 붙이면 짠! 하고 나타납니다 */
        .comic-grid img.show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* 4. 결과 기록 영역 (가운데 유동적 확장) */
        #result_text {
            flex-grow: 1; /* 남은 빈 공간을 모두 차지함 (키보드 올라오면 자동으로 줄어듦!) */
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            overflow-y: auto; /* 내용이 넘치면 여기만 스크롤 됨 */
            white-space: pre-wrap;
            border: 2px dashed #FFED983A;
            padding: 10px;
            background-color: #fafafa;
        }

        /* 5. 입력창 및 버튼 영역 (아래쪽 고정) */
        .bottom-controls {
            flex-shrink: 0; /* 절대 크기가 줄어들지 않음 */
            padding-bottom: 15px; /* 하단 여백 */
        }

        #reque {
            display: block;
            width: calc(100% - 20px);
            height: 40px;
            margin: 0 10px 10px 10px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #FFED983A;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .button-layout {
            display: flex;
            margin: 0 10px;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 0;
            background-color: #FFED983A !important; 
            color: #000000 !important;             
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="comic-layout">
        <div class="comic-grid">
            <img src="https://superboyda.github.io/superboyda/1c.png" alt="만화 1컷">
            <img src="https://superboyda.github.io/superboyda/2c.png" alt="만화 2컷">
            <img src="https://superboyda.github.io/superboyda/3c.png" alt="만화 3컷">
            <img src="https://superboyda.github.io/superboyda/4c.png" alt="만화 4컷">
        </div>
    </div>

    <div id="result_text"></div>

    <div class="bottom-controls">
        <input type="number" id="reque" placeholder="숫자를 입력해주세요" maxlength="3" oninput="maxLengthCheck(this)" autofocus>
        <div class="button-layout">
            <button id="answerB" class="btn">투구!!</button>
            <button id="resetB" class="btn">처음부터</button>
        </div>
    </div>
</div>

<script>
    const reque = document.getElementById('reque');
    const resultText = document.getElementById('result_text');
    const answerBtn = document.getElementById('answerB');
    const resetBtn = document.getElementById('resetB');

    let comNumbers = [];
    let lifeCount = 10;
    let strike = 0;
    let ball = 0;
    
    // 이미지 로딩을 기다리지 않고 HTML이 준비되면 즉시 실행! (안전성 강화)
    document.addEventListener("DOMContentLoaded", function() {
        initGame();
        animateComics();
    });

    // 🌟 만화 컷 순차적 애니메이션
    function animateComics() {
        const panels = document.querySelectorAll('.comic-grid img');
        
        panels.forEach((panel, index) => {
            // 0.6초 간격으로 이미지가 하나씩 등장
            setTimeout(() => {
                panel.classList.add('show');
            }, (index + 1) * 600); 
        });
    }

    // 게임 자동 시작
    function initGame() {
        reset();
        randomNumber();
        viewMode("start");
        
        reque.focus(); 
        resultText.innerText = "★ 숫자가 생성되었습니다. 게임 시작! ★\n\n";
    }

    answerBtn.addEventListener('click', function() {
        numberCheck();
        reque.value = ""; 
        reque.focus();    
    });

    resetBtn.addEventListener('click', function() {
        initGame(); 
    });

    function viewMode(mode) {
        if (mode === "start") {
            answerBtn.disabled = false;
            resetBtn.disabled = false;
            reque.disabled = false;
        } else if (mode === "end") {
            answerBtn.disabled = true;
            reque.disabled = true;
        }
    }

    function randomNumber() {
        let set = new Set();
        while (set.size < 3) {
            let randomValue = Math.floor(Math.random() * 9) + 1;
            set.add(randomValue);
        }
        comNumbers = Array.from(set);
        comNumbers.sort(() => Math.random() - 0.5);
    }

    function reset() {
        lifeCount = 10;
        resultText.innerText = "";
        reque.value = "";
        strike = 0;
        ball = 0;
    }

    function numberCheck() {
        let inputNumber = reque.value;

        if (inputNumber.length === 3) {
            lifeCount--;

            let userNumbers = [
                parseInt(inputNumber.substring(0, 1)),
                parseInt(inputNumber.substring(1, 2)),
                parseInt(inputNumber.substring(2, 3))
            ];

            for (let num = 0; num < 3; num++) {
                for (let num2 = 0; num2 < 3; num2++) {
                    if (comNumbers[num] === userNumbers[num2]) {
                        if (num === num2) {
                            strike++;
                        } else {
                            ball++;
                        }
                    }
                }
            }

            if (strike === 3) {
                resultText.innerText += `▶ ${inputNumber} : 3 Strike!! 홈런! 🎉\n`;
                resultText.innerText += ` 정답: ${comNumbers.join('')} -> 게임 성공!\n`;
                viewMode("end"); 
            } else if (lifeCount === 0) {
                resultText.innerText += `▶ ${inputNumber} : ${strike}S ${ball}B\n`;
                resultText.innerText += ` 기회를 모두 소진했습니다. 실패! 😢\n`;
                resultText.innerText += ` 정답은 [ ${comNumbers.join('')} ] 이었습니다.\n`;
                viewMode("end"); 
            } else {
                showResult(inputNumber);
            }

            strike = 0;
            ball = 0;

        } else {
            alert("숫자 3개를 입력해 주세요");
        }
    }

    function showResult(inputNumber) {
        let result = `Strike: ${strike}, Ball: ${ball}`;
        resultText.innerText += `[기회:${lifeCount}번]  ${inputNumber}  ☞  ${result}\n`;
        resultText.scrollTop = resultText.scrollHeight;
    }

    function maxLengthCheck(object){
        if (object.value.length > object.maxLength){
            object.value = object.value.slice(0, object.maxLength);
        }
    }
</script>
</body>
</html>
